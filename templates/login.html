<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Commerce Analytics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #048A81 0%, #2E4057 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: #048A81;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #048A81;
        }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #048A81 0%, #036b64 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            border: 1px solid #f5c6cb;
        }

        .credentials-box {
            background: #f9f9f9;
            padding: 1.5rem;
            border-radius: 5px;
            margin-top: 2rem;
            border: 1px solid #ddd;
        }

        .credentials-box h3 {
            color: #333;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .credential-item {
            padding: 0.5rem 0;
            font-size: 0.85rem;
            border-bottom: 1px solid #eee;
        }

        .credential-item:last-child {
            border-bottom: none;
        }

        .credential-label {
            color: #048A81;
            font-weight: 600;
        }

        .credential-value {
            color: #666;
            margin-left: 0.5rem;
        }

        .info-box {
            background: #e8f4f8;
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1.5rem;
            border-left: 4px solid #048A81;
            font-size: 0.85rem;
            color: #555;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>📊 Analytics</h1>
            <p>E-Commerce Customer Analysis Platform</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="submit-btn">Login</button>
        </form>

        <div class="info-box">
            <strong>ℹ️ For Production:</strong> Change these default credentials in app.py and use a proper user database.
        </div>

        <div class="credentials-box">
            <h3>📝 Demo Credentials</h3>
            <div class="credential-item">
                <span class="credential-label">Admin</span>
                <span class="credential-value">admin / admin123</span>
            </div>
            <div class="credential-item">
                <span class="credential-label">Analyst</span>
                <span class="credential-value">analyst / analyst123</span>
            </div>
            <div class="credential-item">
                <span class="credential-label">Viewer</span>
                <span class="credential-value">viewer / viewer123</span>
            </div>
        </div>
    </div>
</body>
</html>
